<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Vanilla JS SPA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    nav a {
      margin-right: 10px;
      text-decoration: none;
      color: blue;
    }

    nav a.active {
      font-weight: bold;
      color: darkblue;
    }

    #app {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <nav>
    <a href="#home" id="link-home">Home</a>
    <a href="#about" id="link-about">About</a>
    <a href="#contact" id="link-contact">Contact</a>
  </nav>

  <div id="app"></div>

  <script>
    // ページごとのコンテンツ定義

    const homeContent = `
    <h2>Home</h2>
    <p>I’m Shouta Ishikuro.</p>
    <p>I develop applications as a hobby, not professionally.</p>
    <h2>Portfolio</h2>
    <h4>Niconico's most popular 3 videos</h4>
    <p>
    <a href="https://give-fun.netlify.app/">https://give-fun.netlify.app</a>
    </p>
    <h4>Rondom number generator</h4>
    <p><a href="./rondom.html">Rondom number generator</a></p>
    <h4>Flask Web App</h4>
    <p>
      <a href="https://myflask-9t0e.onrender.com">https://myflask-9t0e.onrender.com</a>
    </p>
    <h4>今日の紅茶</h4>
    <p>
      <a href="https://script.google.com/macros/s/AKfycbxkWmOO2CCZWPg2HkZb6D73mqzwtwuCRVFu-wHGIav3q9vxldm5Qk-zoHGo-ZDUVIit3A/exec">https://script.google.com/macros/s/AKfycbxkWmOO2CCZWPg2HkZb6D73mqzwtwuCRVFu-wHGIav3q9vxldm5Qk-zoHGo-ZDUVIit3A/exec</a>
      </p>
    <h2>Sporiyfy</h2>

    <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/5f39xcRg0yB60U8cZn3Xxp?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
  `;
    const routes = {
      home: homeContent,
      about: "<h2>About</h2><p>This is a simple SPA without any framework.</p>",
      contact: "<h2>Contact</h2><p><a href=\"mailto:shota_ishikuro@outlook.com\">Contact us</a></p>",
    };

    // ページ描画関数
    function renderPage() {
      const hash = location.hash.replace("#", "") || "home"; // デフォルトはhome
      const app = document.getElementById("app");

      // コンテンツ描画
      app.innerHTML = routes[hash] || "<h2>404</h2><p>Page not found</p>";

      // ナビゲーションのアクティブ表示
      document.querySelectorAll("nav a").forEach(a => {
        a.classList.toggle("active", a.getAttribute("href") === "#" + hash);
      });
    }

    // ハッシュ変更時にページ更新
    window.addEventListener("hashchange", renderPage);

    // 初期表示
    renderPage();
  </script>

</body>

</html>
